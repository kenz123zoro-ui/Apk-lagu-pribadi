<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1db954">
<title>MusikKu Pro</title>
<link rel="manifest" href="manifest.json">
<style>
:root{--bg:#121212;--card:#181818;--hover:#282828;--text:#fff;--sub:#b3b3b3;--green:#1db954}
*{transition:all.2s ease;box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,#1a1a1a 0%,var(--bg) 400px);color:var(--text);font-family:Arial;padding-bottom:160px;min-height:100vh}
header{padding:20px;font-size:24px;font-weight:bold;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:rgba(18,18,18,.9);backdrop-filter:blur(10px);z-index:10}
.user-badge{font-size:12px;background:#333;padding:6px 12px;border-radius:15px}
.btn-add{background:var(--green);border:none;color:#000;padding:8px 16px;border-radius:20px;font-weight:bold;cursor:pointer;font-size:13px}
#search{width:calc(100% - 40px);margin:0 20px 15px;padding:12px 16px;border-radius:25px;border:none;background:#2a2a2a;color:var(--text)}
.filter-tabs{display:flex;gap:10px;padding:0 20px 15px;overflow-x:auto}
.tab{padding:8px 16px;background:#2a2a2a;border-radius:20px;cursor:pointer;font-size:13px;white-space:nowrap}
.tab.active{background:var(--green);color:#000;font-weight:bold}
.song{display:flex;align-items:center;padding:12px;border-radius:8px;cursor:pointer;margin:0 20px 8px;background:var(--card)}
.song:hover{background:var(--hover);transform:translateX(4px)}
.song.active{background:linear-gradient(90deg,#1db95422,var(--hover));border-left:3px solid var(--green)}
.song img{width:50px;height:50px;border-radius:6px;background:#333;margin-right:12px;object-fit:cover}
.song-info{flex:1;overflow:hidden}
.song-title{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.song-artist{font-size:12px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.song-btns{display:flex;gap:8px}
.btn-icon{background:none;border:none;font-size:20px;cursor:pointer;color:var(--sub)}
.btn-icon.active{color:var(--green)}
.player{position:fixed;bottom:0;left:0;right:0;background:rgba(24,24,24,.98);backdrop-filter:blur(15px);padding:12px 20px;border-top:1px solid #282828;z-index:20}
.now-playing-bar{display:flex;align-items:center;margin-bottom:10px;gap:10px}
.now-playing-bar img{width:40px;height:40px;border-radius:4px;background:#333;object-fit:cover}
.now-text{flex:1;overflow:hidden}
.now-title{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.now-artist{font-size:12px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.progress{width:100%;height:4px;background:#535353;border-radius:2px;cursor:pointer;margin-bottom:12px;position:relative}
.progress-bar{height:100%;background:var(--green);width:0%;border-radius:2px}
.time-info{display:flex;justify-content:space-between;font-size:11px;color:var(--sub);margin-bottom:8px}
.controls{display:flex;align-items:center;justify-content:center;gap:15px}
.controls button{background:none;border:none;color:var(--text);font-size:22px;cursor:pointer}
.controls button:active{transform:scale(.9)}
.controls button.main{background:var(--text);color:var(--bg);width:48px;height:48px;border-radius:50%;font-size:20px}
.controls button.active{color:var(--green)}
audio{display:none}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;z-index:30}
.modal.show{display:flex}
.modal-content{background:var(--card);padding:30px;border-radius:12px;width:90%;max-width:400px;max-height:80vh;overflow-y:auto}
.modal-content h2{margin:0 0 20px}
.modal-content input,.modal-content textarea{width:100%;padding:12px;margin-bottom:15px;border:none;border-radius:8px;background:#2a2a2a;color:var(--text);font-family:Arial}
.modal-content textarea{min-height:120px;resize:vertical}
.modal-content button{width:100%;padding:12px;background:var(--green);border:none;border-radius:8px;color:#000;font-weight:bold;cursor:pointer;margin-top:10px}
.modal-content button.cancel{background:#333;color:var(--text)}
#playModeStatus{padding:0 20px 10px;color:var(--sub);font-size:11px;text-align:center}
</style>
</head>
<body>
<header>
  <span class="user-badge">👤 Offline Mode</span>
  <div><button class="btn-add" onclick="showAddModal()">+ Tambah</button></div>
</header>
<input type="text" id="search" placeholder="Cari lagu, artis...">
<div id="playModeStatus">Mode: <span id="modeText">Berurutan</span></div>
<div class="filter-tabs">
  <div class="tab active" onclick="setFilter('all')">Semua</div>
  <div class="tab" onclick="setFilter('fav')">⭐ Favorite</div>
</div>
<div id="playlist"></div>
<audio id="audio" preload="metadata" playsinline></audio>
<div class="player">
  <div class="now-playing-bar" id="nowBar">
    <img id="nowCover" src="data:image/svg+xml,%3Csvg width='40' height='40'%3E%3Crect width='40' height='40' fill='%23333'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' fill='%23b3b3b3'%3E♪%3C/text%3E%3C/svg%3E">
    <div class="now-text">
      <div class="now-title" id="nowTitle">Belum ada lagu</div>
      <div class="now-artist" id="nowArtist">Tambah lagu dulu</div>
    </div>
  </div>
  <div class="progress" id="progress"><div class="progress-bar" id="progressBar"></div></div>
  <div class="time-info"><span id="currentTime">0:00</span><span id="duration">0:00</span></div>
  <div class="controls">
    <button id="shuffleBtn">🔀</button>
    <button id="prevBtn">⏮</button>
    <button id="playBtn" class="main">▶</button>
    <button id="nextBtn">⏭</button>
    <button id="repeatBtn">🔁</button>
  </div>
</div>
<div class="modal" id="addModal">
  <div class="modal-content">
    <h2>Tambah Lagu</h2>
    <input type="text" id="songUrl" placeholder="URL MP3">
    <input type="text" id="songTitle" placeholder="Judul lagu">
    <input type="text" id="songArtist" placeholder="Artis">
    <input type="text" id="songCover" placeholder="URL cover (opsional)">
    <button onclick="addSong()">Tambah</button>
    <button class="cancel" onclick="hideModal('addModal')">Batal</button>
  </div>
</div>
<script>
let songs=JSON.parse(localStorage.getItem('musikku_songs')||'[]'),current=0,isPlaying=false,isShuffle=false,repeatMode=0,filter='all';
const audio=document.getElementById('audio');
if(songs.length===0){songs=[{name:"SoundHelix Song 1",artist:"SoundHelix",url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",cover:"https://i.imgur.com/8QmQ2xB.png",fav:false},{name:"Acoustic Breeze",artist:"Bensound",url:"https://www.bensound.com/bensound-music/bensound-acousticbreeze.mp3",cover:"https://www.bensound.com/bensound-img/acousticbreeze.jpg",fav:false}];saveSongs()}
function saveSongs(){localStorage.setItem('musikku_songs',JSON.stringify(songs))}
function showModal(id){document.getElementById(id).classList.add('show')}
function hideModal(id){document.getElementById(id).classList.remove('show')}
function showAddModal(){showModal('addModal')}
function setFilter(type){filter=type;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));event.target.classList.add('active');renderPlaylist()}
function addSong(){const url=document.getElementById('songUrl').value;if(!url)return alert('URL wajib diisi');songs.push({name:document.getElementById('songTitle').value||'Unknown',artist:document.getElementById('songArtist').value||'Unknown',url,cover:document.getElementById('songCover').value||'https://i.imgur.com/8QmQ2xB.png',fav:false});saveSongs();renderPlaylist();hideModal('addModal');document.getElementById('songUrl').value='';document.getElementById('songTitle').value='';document.getElementById('songArtist').value='';document.getElementById('songCover').value=''}
function toggleFav(i){songs[i].fav=!songs[i].fav;saveSongs();renderPlaylist()}
function renderPlaylist(){let list=filter==='fav'?songs.filter(s=>s.fav):songs;let keyword=document.getElementById('search').value.toLowerCase();if(keyword)list=list.filter(s=>s.name.toLowerCase().includes(keyword)||s.artist.toLowerCase().includes(keyword));document.getElementById('playlist').innerHTML=list.length?list.map((s,i)=>{const idx=songs.indexOf(s);return `<div class="song ${idx===current?'active':''}" onclick="playIndex(${idx})"><img src="${s.cover}" onerror="this.src='data:image/svg+xml,%3Csvg width=50 height=50%3E%3Crect width=50 height=50 fill=%23333/%3E%3Ctext x=50%25 y=50%25 dominant-baseline=middle text-anchor=middle fill=%23b3b3b3%3E♪%3C/text%3E%3C/svg%3E'"><div class="song-info"><div class="song-title">${s.name}</div><div class="song-artist">${s.artist}</div></div><div class="song-btns"><button class="btn-icon ${s.fav?'active':''}" onclick="event.stopPropagation();toggleFav(${idx})">⭐</button></div></div>`}).join(''):'<div style="text-align:center;color:#b3b3b3;padding:40px">Belum ada lagu</div>'}
function playIndex(i){if(i<0||i>=songs.length)return;current=i;const s=songs[i];audio.src=s.url;audio.play();isPlaying=true;document.getElementById('nowTitle').textContent=s.name;document.getElementById('nowArtist').textContent=s.artist;document.getElementById('nowCover').src=s.cover;document.getElementById('playBtn').textContent='⏸';renderPlaylist()}
document.getElementById('playBtn').onclick=()=>{if(!songs.length)return;isPlaying?audio.pause():audio.play();isPlaying=!isPlaying;document.getElementById('playBtn').textContent=isPlaying?'⏸':'▶'};
document.getElementById('nextBtn').onclick=()=>playIndex((current+1)%songs.length);
document.getElementById('prevBtn').onclick=()=>playIndex((current-1+songs.length)%songs.length);
document.getElementById('shuffleBtn').onclick=function(){isShuffle=!isShuffle;this.classList.toggle('active',isShuffle);document.getElementById('modeText').textContent=isShuffle?'Acak':'Berurutan'};
document.getElementById('repeatBtn').onclick=function(){repeatMode=(repeatMode+1)%3;this.classList.toggle('active',repeatMode>0);this.textContent=repeatMode===2?'🔂':'🔁'};
document.getElementById('progress').onclick=function(e){if(!audio.duration)return;audio.currentTime=(e.offsetX/this.offsetWidth)*audio.duration};
document.getElementById('search').oninput=renderPlaylist;
audio.ontimeupdate=()=>{if(audio.duration){document.getElementById('progressBar').style.width=(audio.currentTime/audio.duration*100)+'%';document.getElementById('currentTime').textContent=formatTime(audio.currentTime);document.getElementById('duration').textContent=formatTime(audio.duration)}};
audio.onended=()=>{if(repeatMode===2)audio.play();else if(repeatMode===1||isShuffle)playIndex(isShuffle?Math.floor(Math.random()*songs.length):(current+1)%songs.length);else if(current<songs.length-1)playIndex(current+1);else{isPlaying=false;document.getElementById('playBtn').textContent='▶'}};
audio.onplay=()=>{isPlaying=true;document.getElementById('playBtn').textContent='⏸'};
audio.onpause=()=>{isPlaying=false;document.getElementById('playBtn').textContent='▶'};
function formatTime(s){const m=Math.floor(s/60),sec=Math.floor(s%60);return m+':'+(sec<10?'0':'')+sec}
renderPlaylist();
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js')}
</script>
</body>
</html>
